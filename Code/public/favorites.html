<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Favorites</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>

<div class="header">
    <a class="navbar home icon" href="index.html"><img alt="C"></a>
    <a class="navbar" href="index.html">Home</a>
    <a class="navbar current" href="favorites.html">Favorites</a>
    <a class="navbar disabled" href="#">Projects</a>
    <a class="navbar" href="contact.html">Contact</a>
    <a class="navbar" href="admin.html">Admin</a>
</div>

<div class="page">

<h1>Things I like slightly less than my friends and pets.</h1>

<table>
    <thead>
        <tr>
            <th>Image</th>
            <th>Title and Author</th>
            <th>Description</th>
        </tr>
    </thead>

    <tbody id="booksTableBody">

    </tbody>
</table>

</div>

<div class="bottom">
    <p>
        Copyright 2025.
        This website does not use cookies.
        <a href="http://youtu.be/dQw4w9WgXcQ">Terms of Conditions and Privacy Policy</a>
    </p>
</div>

<script src="script.js"></script>

<script>
async function loadBooks() {
    const response = await fetch('/api/books');
    const books = await response.json();

    const tbody = document.getElementById('booksTableBody');
    tbody.innerHTML = '';

    books.forEach(book => {
        tbody.innerHTML += `
            <tr>
                <td>
                    <a href="${book.link}" target="_blank">
                    <img src="images/${book.image}" class="icon">
                    </a>
                </td>
                <td>
                    <strong>${book.title}</strong><br>
                    ${book.author}
                </td>
                <td>
                    ${book.description}
                </td>
            </tr>
        `;
    });
}

loadBooks();
</script>

</body>
</html>
